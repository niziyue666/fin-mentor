market_analysis:
  description: >
    对股票 {stock_code}（{company_name}）进行A股市场技术分析。

    【第一步-数据获取】利用 AStockDataTool 获取实时行情和日线数据。
    利用 MarketSentimentTool 获取主力资金流向数据。

    【第二步-知识检索】获取数据后，必须调用 Q1KnowledgeTool 获取知识库内容！
    将实际数据（价格、MA5、MA20、RSI、量比、涨跌幅）传入 Q1KnowledgeTool，它会根据数据特征自动触发对应的知识章节。

    【第三步-报告撰写】根据检索到的知识内容完成分析，禁止自己编造概念解释！

    你是一位实战经验丰富的金融导师，带徒弟时讲究"先讲透原理，再给结论"。

    【重要规则 - 趋势状态必须与数据一致】

    在写 trend_status 之前，必须先判断当前价格与MA5、MA20的实际关系：
    - 如果 price > MA5 > MA20 → "均线多头排列，股价处于上升趋势"
    - 如果 MA5 > MA20 且 MA5 > price > MA20 → "均线多头但股价回落至MA5下方，处于强势整理阶段"
    - 如果 MA5 > MA20 且 price < MA20 → "均线多头排列但股价跌破MA20，整理失败，需警惕趋势转弱"
    - 如果 MA5 < MA20 → "均线空头排列，股价处于下降趋势"

    【重要规则 - 引用知识库必须完整】

    引用某章节的知识库内容时，必须检查该章节的所有判断条件：
    1. 先看当前数据是否满足章节的"前提条件"
    2. 再看当前数据是否触发了章节的"止损/失败"条件
    3. 如果同时满足"前提条件"和"止损条件"，优先输出止损逻辑！
    4. 禁止只引用章节中的有利部分，忽略风险提示部分！

    【致命规则 - 违反整篇报告作废】
    1. 你必须从 AStockDataTool 返回的数据中提取当前价格、MA5、MA20、RSI 数值
    2. 你必须从 MarketSentimentTool 返回的数据中提取量比数值
    3. 你必须把这些数值填入 key_indicators 字段
    4. 在填写 fund_flow 时，禁止写出与 key_indicators 中量比不同的描述！
    5. 如果 key_indicators 写的是量比=1.0，fund_flow 就只能说"量比 1.0 倍"，不能说"放量 2 倍"或任何其他数值！

    【强制输出格式 - 必须严格遵守】
    analysis_text 必须包含三部分，每部分单独一段：

    【概念解释】必须引用 Q1KnowledgeTool 检索返回的知识内容！
    - 禁止自己编造概念解释！
    - 直接复制检索到的"什么是XXX"部分作为解释
    - 例如：如果是强势整理形态，直接写"根据知识库：均线仍然多头排列（MA5 > MA20），但股价短暂跌回MA5下方，这种形态叫'强势整理'，是上涨趋势中的正常回调"

    【数据】将实际数值代入，结合指标关系说明现在是什么状态（4-5句）
    必须体现：当前价格与MA5、MA20的相对位置关系！

    【结论】必须引用 Q1KnowledgeTool 检索返回的"对初学者的操作含义"部分！
    - 禁止自己编写操作建议！
    - 直接复制知识库中的操作建议，结合当前数据进行调整

    【trend_status 趋势状态编写规则 - 必须严格遵守】
    - 如果 MA5 > MA20 且 现价 > MA5 → "均线多头排列，股价处于上升趋势"
    - 如果 MA5 > MA20 且 MA5 > 现价 > MA20 → "均线多头但股价回落至MA5下方，处于强势整理阶段"
    - 如果 MA5 > MA20 且 现价 < MA20 → "均线多头排列但股价跌破MA20，整理失败，需警惕趋势转弱"
    - 如果 MA5 < MA20 → "均线空头排列，股价处于下降趋势"
    - 如果 MA5 < MA20 且 现价 < MA5 → "均线空头且股价低于MA5，趋势较弱"
    - 禁止简单写"多头排列"而不说明现价与均线的关系！

    【结论触发条件编写规则 - 必须严格遵守】
    1. 每个价位必须说明来源！
       - "突破1466（近期高点/MA5附近）"不能说"突破1466"
       - "跌破1437（MA20支撑位）"不能说"跌破1437"
    2. 必须根据当前数据决定风险/机会信号！
       - 如果现价 < MA20 → 必须输出 🔴 风险信号：跌破MA20，中期趋势转弱
       - 如果现价 > MA20 且 现价 < MA5 → 可输出 ✅ 机会信号
    3. 风险信号的措辞要比机会信号更严肃！
    4. 禁止在已经触发止损条件时还输出机会信号！

    【禁止事项】
    - 禁止直接给结论不解释原因
    - 禁止出现"低吸"、"回踩"、"高抛"等词
    - 禁止价位数字不说明来源！
    - 禁止机会和风险用相同措辞！

  expected_output: >
    严格输出以下JSON，不要输出任何其他内容：
    {
      "module_id": "Q1",
      "analysis_reasoning": "分析推理过程（100字内）：为什么这样判断趋势，MA信号和RSI信号如何相互验证",
      "trend_status": "根据上述规则给出趋势状态，必须体现现价与均线关系",
      "key_indicators": {"current_price": 当前价, "MA5": MA5值, "MA20": MA20值, "RSI": RSI值, "volume_ratio": 量比值},
      "fund_flow": "资金流向说明",
      "analysis_text": "必须包含【概念解释】【数据】【结论】三部分，每部分单独分段",
      "mentor_insight": "用生活场景比喻总结现在该怎么办",
      "trigger_conditions": {
        "机会信号": "✅ 放量突破XX（阻力位说明），可考虑小仓位跟进",
        "风险信号": "🔴 跌破XX（支撑位说明），中期趋势转弱，需认真考虑减仓"
      }
    }

financial_analysis:
  description: >
    对 {company_name}（{stock_code}）进行财务分析。

    【第一步】调用 FinancialAnalysisTool，analysis_type="scoring" 获取财务评分结果
    （这是工具计算好的评分，包含：股票类型、关键财务指标、评分维度详情、总分、特别警告、特别说明）
    你必须直接使用这个结果，不允许自己计算任何数值！

    【第二步】调用 FinancialAnalysisTool，analysis_type="ratio" 获取财务比率详情
    （这是辅助参考，包含历史PE等）

    【第三步-知识检索】必须调用 Q2KnowledgeTool 获取财务分析知识框架！
    将提取的财务数据传入 Q2KnowledgeTool：
    - net_profit: 净利润（负数为亏损）
    - net_profit_last_q: 上季度净利润
    - consecutive_loss_q: 连续亏损季度数
    - net_profit_yoy: 净利润同比变化率
    - debt_ratio: 资产负债率
    - pe_ttm: PE(TTM)，亏损时为None
    - pe_percentile_3y: PE近3年历史分位
    - pb: 市净率PB
    roe: 净资产收益率
    - revenue_growth: 营收同比增速
    - revenue_growth_q_list: 最近3个季度营收增速列表
    - receivable_ratio: 应收账款/营收
    - cfo_to_net_profit: 经营现金流/净利润
    - net_profit_qoq: 净利润环比变化率
    - gross_margin: 毛利率

    【第四步-分析输出】根据检索到的知识内容完成分析，禁止自己编造财务分析逻辑！

    =====================================================
    【致命规则 - 违反整篇报告作废】
    =====================================================

    1. 【必须】从 scoring 工具返回的 JSON 中提取以下字段的值：
       - 股票类型（盈利股/亏损股）
       - 关键财务指标（ROE、毛利率、净利润率、资产负债率、PE、营收增速等）
       - 评分维度详情（每个维度的得分和原因）
       - 总分（如 "85/100分"）
       - 特别警告（如有）
       - 特别说明（如有免责声明）

    2. 【禁止】在 analysis_text、risk_factors、buy_signal、caution_signal 中
       写出任何 scoring 返回数据中没有的数值！

    3. 【禁止】如果 scoring 返回 ROE=26%，不能说 ROE=30%
    4. 【禁止】如果 scoring 返回 总分=74，不能说 总分=85

    =====================================================
    【正确示范】
    =====================================================
    scoring 工具返回的JSON字段（必须包含这些）：
    {
      "股票类型": "盈利股",
      "数据截止日期": "2024-12-31",
      "关键财务指标": {"ROE": "26.37%", "PE": "28.0倍", ...},
      "评分维度": {"盈利能力": "30/30分", "成长能力": "15/25分", ...},
      "总分": "74/100分",
      "评分含义": "优秀/良好/一般/较差",
      "特别警告": ["负债率过高，总分上限锁定60分"],
      "特别说明": []
    }

    正确写法：
    - financial_score: "74/100分"
    - dimension_scores: {"盈利能力": "30/30分", "成长能力": "15/25分", ...}
    - analysis_text: "ROE=26.37%盈利能力顶尖，但PE=28倍估值略高，总分74分显示基本面一般"
    - caution_signal: "负债率过高，总分上限锁定60分"

    =====================================================
    【错误示范 - 禁止】
    =====================================================
    - financial_score: "85/100分" ❌（scoring 返回的是 74）
    - analysis_text: "ROE=30%" ❌（scoring 返回的是 26.37%）
    - analysis_text: "PE=21倍" ❌（scoring 返回的是 28倍）

    【核心要求】
    1. 只给一个核心结论，不允许自相矛盾！
    2. 必须输出"现在该怎么办"，不能只给分数！
    3. 亏损股必须输出特别说明中的免责声明！

    【绝对禁止】
    1. 禁止说"缺少XX字段"、"无法获取XX"！scoring工具一定返回了这些字段！
    2. 如果你找不到某个字段，说明你没有仔细查看工具返回的JSON！
    3. 绝对禁止自己编造字段不存在的说法！

  expected_output: >
    输出必须是JSON格式，包含以下字段：
    {
      "module_id": "Q2",
      "analysis_reasoning": "分析推理过程（100字内）：为什么给这个财务评分，各维度得分和扣分原因是什么",
      "股票类型": "直接填写 scoring 返回的股票类型（盈利股/亏损股（单季亏损）/亏损股（连续亏损））",
      "valuation_level": "根据 scoring 中的 PE 和 PB 数据判断：高估/合理/低估 + 一句话依据",
      "historical_pe": "从 ratio 结果中获取，或直接写 'scoring 中已包含当前PE'",
      "valuation_method": "PE或PS（亏损时用PS）",
      "key_financial_indicators": "直接复制 scoring 返回的 '关键财务指标'",
      "financial_score": "直接填写 scoring 返回的 '总分'（如 '74/100分'）",
      "dimension_scores": "直接复制 scoring 返回的 '评分维度'",
      "trend_analysis": "基于 scoring 中的营收增速、净利润增速数据分析趋势",
      "risk_factors": "根据 scoring 数据生成风险因素，禁止编造！",
      "analysis_text": "财务分析解读（100字内），必须使用 scoring 返回的数值！",
      "comparison_insight": "用通俗语言解释这家公司的财务特点",
      "buy_signal": "基于 scoring 总分和估值水平给出买入条件",
      "caution_signal": "直接填写 scoring 返回的 '特别警告'（如有）",
      "disclaimer": "直接填写 scoring 返回的 '特别说明'（亏损股必须有，非亏损股可为空）"
    }


sentiment_analysis:
  description: >
    分析 {company_name}（{stock_code}）的市场情绪状况。

    【第一步】调用 sentiment_type="market" 获取市场整体情绪（大盘涨跌、情绪指数）

    【第二步】调用 sentiment_type="news" 获取个股30条新闻标题

    【第三步】调用 sentiment_type="technical" 获取技术指标（RSI、MACD、量比）

    【第四步-知识检索】必须调用 Q3KnowledgeTool 获取情绪分析知识框架！
    将提取的情绪数据传入 Q3KnowledgeTool：
    - sentiment_score: 综合情绪分（-100到100）
    - sentiment_structure: 情绪结构类型（黑天鹅型/趋势型/博弈型/钝化型/无明显信号）
    - has_regulatory_news: 是否含监管介入/高管被查新闻
    - has_policy_news: 是否含行业政策/监管变化新闻
    - has_earnings_news: 是否含业绩/财报相关新闻
    - retained_news_count: 去重后保留的有效新闻数量
    - raw_news_count: 去重前原始新闻数量
    - negative_days: 负面情绪持续天数
    - market_breadth: 市场广度（0-1）
    - days_since_event: 黑天鹅事件发生距今天数

    【第五步-分析输出】根据检索到的知识内容完成分析，禁止自己编造情绪分析逻辑！

    【致命规则 - 违反整篇报告作废】
    1. 你必须从 technical 工具返回的数据中提取量比数值
    2. 你必须把量比填入 key_sentiment_indicators 字段
    3. 在填写"技术面分析"时，禁止写出与 key_sentiment_indicators 中量比不同的描述！
    4. 如果 key_sentiment_indicators 写的是量比=1.0，技术面分析只能说"量比 1.0 倍"，不能说"放量 2 倍"或任何其他数值！
    5. Q1市场分析中的量比数据与本任务技术面分析中的量比数据必须完全一致，如果不一致以 key_indicators 中的数值为准！

    【输出格式分三大块】

    【一、市场情绪】根据market工具返回的以下数据分析：
    - 上涨股票：X只
    - 下跌股票：X只
    - 市场广度：X（如0.55）
    - 市场情绪：贪婪/乐观/中性/恐慌/极度恐慌
    - 大盘状态：上涨/下跌/震荡
    【禁止】不要写"个股"信息，不要说"缺少数据"，不要编造！

    【二、个股情绪】
    1. 新闻情绪分析（S1-S4）：
    - S1_情绪总结：整体新闻情绪倾向
    - S2_负面信号：利空新闻及影响
    - S3_正面信号：利好新闻及影响
    - S4_结构解读：新闻情绪结构分析
    - S5_建议关注：后续关注信号

    2. 技术面分析：根据technical工具数据，简要分析RSI、MACD、量比（必须使用 key_sentiment_indicators 中的原始数值！）

    【三、综合判断】结合市场+新闻+技术，给出最终结论：
    - 综合结论：看多/观望/看空 + 理由

    【核心要求】
    1. 三大块分开写，不要混在一起
    2. 只给一个核心结论，不自相矛盾
    3. 技术面可以说金叉死叉等专业术语

  expected_output: >
    严格输出以下JSON，不要输出任何其他内容：
    {
      "module_id": "Q3",
      "analysis_reasoning": "分析推理过程（100字内）：为什么给这个情绪判断，新闻情绪和技术面信号如何综合得出结论",
      "市场情绪": {"大盘状态": "上涨/下跌/震荡", "市场情绪": "贪婪/乐观/中性/恐慌/极度恐慌", "解读": "简要解读"},
      "key_sentiment_indicators": {"RSI": RSI数值, "MACD": "金叉/死叉/持续", "量比": 数值},
      "news_count": "获取到的新闻条数",
      "S1_情绪总结": "整体新闻情绪倾向",
      "S2_负面信号": "利空新闻及影响",
      "S3_正面信号": "利好新闻及影响",
      "S4_结构解读": "新闻情绪结构分析",
      "S5_建议关注": "后续关注信号",
      "技术面分析": "技术指标分析结果",
      "综合判断": "看多/观望/看空 + 理由",
      "behavioral_insight": "投资者心理分析",
      "future_signals": {"看多信号": "具体条件", "看空信号": "具体条件", "观察等待": "具体条件"}
    }


investment_recommendation:
  description: >
    作为投研总监，整合 Q1、Q2、Q3 的所有发现，给出最终投资评级和目标价位。

    【数据来源】前三部分的分析结果已经通过 context 传递给你！
    - 你会收到 Q1（市场分析）、Q2（财务分析）、Q3（情绪分析）的完整输出
    - 这些输出就在你的输入上下文中，你直接引用即可！

    【第一步-提取数据】从上下文中提取以下字段：
    - Q1：趋势状态(q1_trend)、当日涨跌幅(daily_change)
    - Q2：财务评分(q2_score)、股票类型(q2_stock_type)
    - Q3：综合判断(q3_sentiment)、情绪结构(q3_structure)

    【第二步-知识检索】必须调用 Q4KnowledgeTool 获取评级框架！
    将提取的数据传入 Q4KnowledgeTool：
    - q1_trend: Q1输出的趋势状态（如"多头排列"、"强势整理"、"空头排列"）
    - q2_score: Q2输出的财务评分数值（如78）
    - q2_stock_type: Q2输出的股票类型（如"盈利股"、"亏损股"）
    - q3_sentiment: Q3输出的综合判断（如"看多"、"观望"、"看空"）
    - q3_structure: Q3输出的情绪结构类型（如"黑天鹅型"、"趋势型"、"博弈型"）
    - daily_change: Q1输出的当日涨跌幅（如 -0.03）

    【第三步-评级输出】根据检索到的知识内容完成评级，禁止自己编造评级逻辑！

    【禁止】
    - 禁止写"数据不可用"！前三部分已经分析过了，数据一定在上下文中！
    - 禁止写"待补充"！如果你找不到数据，说明你没有仔细阅读上下文！
    - 如果你确实找不到某个数据，用上下文中实际提到的内容，而不是说"不可用"

    【输入数据】（你必须引用这些数据，不能编造！）
    - Q1 数据：当前价格、MA5、MA20、RSI、量比、趋势状态、触发条件
    - Q2 数据：财务评分、总分、股票类型、估值水平、特别警告
    - Q3 数据：综合判断、情绪评分、技术面分析

    =====================================================
    【致命规则 - 违反整篇报告作废】
    =====================================================
    1. 【必须引用】在 core_logic 中必须写出具体数据！
       - 禁止写"财务良好"，必须写"Q2财务评分78分"
       - 禁止写"技术面偏多"，必须写"Q1显示MA5>MA20多头排列"
       - 禁止写"情绪偏多"，必须写"Q3综合判断为看多"

    2. 【必须引用】在 investment_rating 的理由中必须包含：
       - Q2 财务评分是多少
       - Q1 趋势状态是什么
       - Q3 综合判断是什么

    3. 【一致性规则】评级必须与各部分结论一致！
       - 如果 Q2 说"高估"或"财务存在明显短板" → 禁止给"买入"
       - 如果 Q1 说"均线空头" → 禁止给"买入"，可给"持有"
       - 如果 Q3 说"看空" → 禁止给"买入"，可给"观望"
       - 如果 Q3 说"观望" → 禁止给"买入"，只能给"持有"或"分批低吸"

    4. 【目标价计算】
       - 盈利股：目标价 = 当前价格 × (1 + 净利润增速/100)
       - 亏损股：目标价 = "公司亏损，暂不设定目标价"

    =====================================================
    【评级参考标准】
    =====================================================
    - 买入：Q2财务评分≥75分 + Q1趋势偏多 + Q3明确"看多"
    - 持有：Q2财务评分60-74分 或 Q1趋势偏多但Q3观望
    - 分批低吸：Q2财务评分≥75分 + Q1趋势偏多 + Q3为"观望"（等待回调再买）
    - 观望：Q3明确"看空" 或 Q2财务评分<60分 或 Q1均线空头
    - 卖出：Q2财务评分<40分 或 有重大风险警告

    =====================================================
    【正确示范】
    =====================================================
    core_logic: "Q2财务评分78分（盈利能力30/30+估值14/20），ROE=26%盈利能力顶尖；Q1显示MA5>MA20均线多头，但现价跌破MA5进入整理；Q3综合判断为看多。综合来看基本面和技术面均有支撑，给予买入评级。"

    =====================================================
    【错误示范 - 禁止】
    =====================================================
    core_logic: "财务良好，技术面偏多，情绪偏多，给予买入" ❌（没有具体数据）

  expected_output: >
    输出必须是JSON格式，包含以下字段：
    {
      "module_id": "Q4",
      "analysis_reasoning": "分析推理过程（150字内）：综合Q1趋势、Q2财务、Q3情绪三个维度，如何得出最终评级，权重如何分配",
      "investment_rating": "买入/持有/观望/卖出 + 一句话核心原因（必须包含Q2评分、Q1趋势、Q3判断）",
      "for_existing_holder": "已持仓投资者的建议（基于当前成本给出操作建议）",
      "for_new_buyer": "未持仓投资者的建议（是否值得买入）",
      "target_price_range": "目标价区间或说明",
      "target_calculation": "目标价计算逻辑",
      "core_logic": "核心逻辑（必须引用Q1/Q2/Q3的具体数据，不能编造！）",
      "action_guide": {
        "买入条件": "什么价格/什么信号可以买",
        "卖出条件": "什么价格/什么信号可以卖",
        "止损条件": "什么价格必须走"
      },
      "learning_summary": "本案例的知识点总结"
    }


